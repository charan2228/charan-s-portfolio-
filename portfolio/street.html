<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Street Stories — Capturin Art</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
background:#050505;
color:white;
font-family:Poppins,sans-serif;
padding:120px 8%;
}

nav{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.4);
padding:12px 35px;
border-radius:40px;
display:flex;
gap:30px;
}

nav a{
color:white;
text-decoration:none;
letter-spacing:2px;
font-size:13px;
}

h1{
text-align:center;
letter-spacing:8px;
margin-bottom:20px;
}

.desc{
text-align:center;
opacity:0.7;
margin-bottom:60px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:25px;
max-width:1100px;
margin:auto;
}

.image-card{
position:relative;
overflow:hidden;
border-radius:14px;
}

.image-card img{
width:100%;
height:350px;
object-fit:cover;
cursor:pointer;
transition:0.4s;
}

.image-card:hover img{
transform:scale(1.05);
}

.caption{
position:absolute;
bottom:0;
width:100%;
padding:20px;
background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
font-size:14px;
}

</style>
</head>

<body>

<nav>

<h1>STREET STORIES</h1>

<p class="desc">
Moments of everyday life captured through light, motion and atmosphere.
</p>

<div class="gallery">

<div class="image-card">
<img src="images/lamakan.jpeg">
<div class="caption">Lamakan Streets — Hyderabad</div>
</div>

<div class="image-card">
<img src="images/spiti-valley.jpeg">
<div class="caption">Journey Roads — Spiti Valley</div>
</div>

<div class="image-card">
<img src="images/clouds.jpeg">
<div class="caption">Monsoon Sky</div>
</div>

</div>

</body>
</html>
