<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Events — Capturin Art</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
background:#050505;
color:white;
font-family:Poppins,sans-serif;
padding:120px 8%;
}

h1{
text-align:center;
letter-spacing:8px;
margin-bottom:20px;
}

p{
text-align:center;
opacity:0.7;
margin-bottom:60px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:25px;
max-width:1100px;
margin:auto;
}

.image-card{
position:relative;
overflow:hidden;
border-radius:14px;
}

.image-card img{
width:100%;
height:350px;
object-fit:cover;
}

.caption{
position:absolute;
bottom:0;
width:100%;
background:rgba(0,0,0,0.7);
padding:15px;
font-size:14px;
}

</style>

</head>

<body>

<h1>EVENTS</h1>

<p>
Capturing celebrations, rituals and shared moments.
</p>

<div class="gallery">

<div class="image-card">
<img src="images/sankranti.jpeg">
<div class="caption">Sankranti Festival</div>
</div>

<div class="image-card">
<img src="images/pooja.jpeg">
<div class="caption">Sacred Rituals</div>
</div>

</div>

</body>
</html>
